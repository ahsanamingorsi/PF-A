<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
  <title>Ahsan Amin Gorsi · Coming Soon</title>
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="AAG Logo.png">
  <link rel="apple-touch-icon" href="AAG Logo.png">

  <!-- Bootstrap 5 + Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      background: #0b0f17;
      background-image: 
        radial-gradient(circle at 20% 30%, rgba(45, 95, 165, 0.12) 0%, transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(25, 70, 120, 0.08) 0%, transparent 50%),
        linear-gradient(135deg, #0a0e17 0%, #121a28 100%);
      color: #eef2fb;
    }

    /* Main card - glassmorphism */
    .coming-card {
      background: rgba(15, 25, 38, 0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(100, 170, 255, 0.15);
      border-radius: 40px;
      padding: 3rem 2.8rem;
      max-width: 820px;
      width: 100%;
      box-shadow: 
        0 25px 50px -12px rgba(0, 0, 0, 0.5),
        0 0 0 0.5px rgba(80, 160, 255, 0.1) inset,
        0 8px 20px rgba(0, 0, 0, 0.3);
    }

    /* Logo */
    .logo-wrapper {
      display: flex;
      justify-content: center;
      margin-bottom: 2.2rem;
    }

    .logo-img {
      width: 100px;
      height: 100px;
      border-radius: 28px;
      object-fit: cover;
      background: linear-gradient(145deg, #132237, #0a121f);
      padding: 10px;
      box-shadow: 
        0 18px 30px -8px rgba(0, 0, 0, 0.7),
        0 0 0 1.5px rgba(70, 150, 255, 0.25);
      transition: transform 0.25s ease;
    }

    .logo-img:hover {
      transform: scale(1.02);
    }

    /* Typography */
    h1 {
      font-weight: 550;
      font-size: 3.8rem;
      letter-spacing: -0.03em;
      margin-bottom: 1rem;
      line-height: 1.15;
      color: #ffffff;
      text-shadow: 0 2px 10px rgba(0, 30, 100, 0.3);
    }

    .lead-description {
      font-size: 1.25rem;
      font-weight: 400;
      margin-bottom: 1rem;
      color: #bdd2f0;
    }

    .rebuilding-text {
      font-size: 1rem;
      font-weight: 400;
      margin-bottom: 2.5rem;
      color: #9ab5da;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .rebuilding-text i {
      font-size: 1.1rem;
      color: #6da5ff;
      opacity: 0.9;
    }

    .name-role {
      margin-bottom: 2.8rem;
    }

    .name {
      font-size: 2.5rem;
      font-weight: 650;
      letter-spacing: -0.02em;
      margin-bottom: 0.6rem;
      color: #ffffff;
    }

    .role-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem 1rem;
    }

    .role-badge {
      font-size: 1rem;
      font-weight: 480;
      padding: 0.35rem 1.2rem;
      border-radius: 50px;
      backdrop-filter: blur(8px);
      transition: all 0.2s;
      letter-spacing: -0.01em;
      color: #d3e3ff;
      background: rgba(40, 85, 160, 0.22);
      border: 1px solid rgba(100, 170, 255, 0.25);
    }

    /* Contact buttons */
    .contact-group {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem 1.2rem;
      margin: 2.5rem 0 2.2rem 0;
    }

    .btn-custom {
      border: 1.5px solid;
      font-weight: 520;
      padding: 0.7rem 1.9rem;
      border-radius: 60px;
      background: transparent;
      transition: all 0.25s cubic-bezier(0.2, 0.8, 0.4, 1);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      backdrop-filter: blur(8px);
      font-size: 1rem;
      letter-spacing: -0.01em;
      color: #e4eeff;
      border-color: #3f72a8;
      background: rgba(20, 38, 60, 0.4);
    }

    .btn-custom i {
      font-size: 1.3rem;
    }

    .btn-custom:hover {
      transform: translateY(-3px);
      background: #1f3f6e;
      border-color: #6aa7ff;
      color: white;
      box-shadow: 0 10px 20px -8px rgba(0, 100, 255, 0.25);
    }

    /* Footer */
    .footer-copyright {
      font-size: 0.85rem;
      border-top: 0.5px solid rgba(110, 160, 220, 0.2);
      padding-top: 2rem;
      margin-top: 0.5rem;
      text-align: center;
      font-weight: 450;
      letter-spacing: 0.2px;
      color: #8ea9cc;
    }

    /* Responsive */
    @media (max-width: 576px) {
      .coming-card { 
        padding: 2.2rem 1.6rem; 
        border-radius: 32px; 
      }
      h1 { 
        font-size: 2.8rem; 
      }
      .name { 
        font-size: 2rem; 
      }
      .lead-description { 
        font-size: 1.15rem; 
      }
      .btn-custom { 
        padding: 0.6rem 1.4rem; 
      }
      .logo-img { 
        width: 85px; 
        height: 85px; 
      }
    }

    /* Focus states */
    .btn-custom:focus-visible {
      outline: 3px solid #5f9eff;
      outline-offset: 3px;
    }
  </style>
</head>
<body>
 <div class="coming-card">
  <!-- Logo -->
  <div class="logo-wrapper">
    <img class="logo-img" src="AAG Logo.png"
         alt="Ahsan Amin Gorsi logo">
  </div>

  <h1>Website Coming Soon</h1>
  
  <div class="lead-description">
    A focused portfolio is in progress, built around real work and practical projects.
  </div>

  <div class="rebuilding-text">
    <i class="bi bi-arrow-repeat"></i>
    <span>Rebuilding with better structure and clearer direction</span>
  </div>

  <div class="name-role">
    <div class="name">Ahsan Amin Gorsi</div>
    <div class="role-tags">
      <span class="role-badge">.NET Developer</span>
      <span class="role-badge">BSCS Student</span>
      <span class="role-badge">Creative Designer</span>
    </div>
  </div>

  <div class="contact-group">
    <a href="mailto:ahsanamingorsi@gmail.com" class="btn-custom">
      <i class="bi bi-envelope"></i> Email
    </a>
    <a href="https://github.com/ahsanamingorsi" class="btn-custom" target="_blank" rel="noopener">
      <i class="bi bi-github"></i> GitHub
    </a>
    <a href="https://www.linkedin.com/in/ahsanamingorsi" class="btn-custom" target="_blank" rel="noopener">
      <i class="bi bi-linkedin"></i> LinkedIn
    </a>
    <a href="https://wa.me/923495473628" class="btn-custom" target="_blank" rel="noopener">
      <i class="bi bi-whatsapp"></i> WhatsApp
    </a>
  </div>

  <div class="footer-copyright">
    <span>© <span id="currentYear"></span> Ahsan Amin Gorsi</span>
  </div>
</div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  
  <script>
    (function() {
      // Set current year in footer
      document.getElementById('currentYear').textContent = new Date().getFullYear();
      
      // No placeholder handling - clean links ready for real URLs
      // Simply replace the href="#" with actual profile links when deploying
    })();
  </script>
</body>
</html>
