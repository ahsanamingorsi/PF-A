<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
  <title>Ahsan Amin Gorsi · Coming Soon</title>
  <!-- Bootstrap 5 + Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- Google Font: clean, modern sans-serif -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0b0e14;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #eef2fb;
      /* subtle dark gradient with soft glow (no heavy graphics) */
      background: radial-gradient(circle at 30% 20%, #1a2538 0%, #0c101c 100%);
      padding: 1.5rem;
    }

    /* main card – minimal, sharp, dark */
    .coming-card {
      background: rgba(18, 25, 35, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(72, 120, 200, 0.18);
      border-radius: 32px;
      padding: 3rem 2rem;
      max-width: 760px;
      width: 100%;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(62, 140, 255, 0.05) inset;
      transition: box-shadow 0.2s ease;
    }

    /* typography */
    h1 {
      font-weight: 500;
      font-size: 3.4rem;
      letter-spacing: -0.02em;
      color: #ffffff;
      margin-bottom: 0.75rem;
      line-height: 1.2;
    }

    .lead-description {
      font-size: 1.2rem;
      font-weight: 400;
      color: #b4c8e9;
      margin-bottom: 2.2rem;
      border-left: 3px solid #3d7ed9;
      padding-left: 1.4rem;
    }

    .name-role {
      margin-bottom: 2.8rem;
    }

    .name {
      font-size: 2.2rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: #ffffff;
      margin-bottom: 0.25rem;
    }

    .role-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem 1rem;
    }

    .role-badge {
      font-size: 1rem;
      font-weight: 450;
      color: #ccddf8;
      background: rgba(54, 108, 194, 0.18);
      padding: 0.25rem 1rem;
      border-radius: 40px;
      border: 0.5px solid rgba(90, 156, 255, 0.2);
      backdrop-filter: blur(4px);
    }

    /* contact buttons (Bootstrap enhanced) */
    .contact-group {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin: 2.2rem 0 2rem 0;
    }

    .btn-outline-light-custom {
      border: 1.5px solid #3a6792;
      color: #e3ecff;
      font-weight: 500;
      padding: 0.65rem 1.8rem;
      border-radius: 48px;
      background: transparent;
      transition: all 0.2s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      backdrop-filter: blur(5px);
      background: rgba(20, 35, 55, 0.35);
    }

    .btn-outline-light-custom:hover {
      background: #1f3a60;
      border-color: #5f9eff;
      color: white;
      box-shadow: 0 0 12px rgba(70, 140, 255, 0.2);
      transform: translateY(-1px);
    }

    .btn-outline-light-custom i {
      font-size: 1.2rem;
    }

    /* subtle progress / loading indicator — minimal, no flash */
    .progress-subtle {
      margin-top: 1.8rem;
      margin-bottom: 2.2rem;
    }

    .progress-indicator {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .progress {
      height: 3px;
      background: rgba(70, 110, 160, 0.2);
      border-radius: 50px;
      flex: 1;
    }

    .progress-bar {
      background: #6da5ff;
      width: 60%; /* static, subtle, not animated – just a visual cue */
      border-radius: 50px;
      box-shadow: 0 0 6px #3d7ed9;
      opacity: 0.9;
    }

    .progress-label {
      font-size: 0.8rem;
      font-weight: 450;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #9ab9e6;
    }

    /* footer */
    .footer-copyright {
      font-size: 0.8rem;
      color: #7f99c0;
      border-top: 0.5px solid rgba(110, 150, 210, 0.2);
      padding-top: 1.8rem;
      margin-top: 0.5rem;
      text-align: center;
    }

    /* responsiveness: slight adjustments */
    @media (max-width: 576px) {
      .coming-card {
        padding: 2.2rem 1.5rem;
        border-radius: 28px;
      }
      h1 {
        font-size: 2.5rem;
      }
      .name {
        font-size: 1.8rem;
      }
      .lead-description {
        font-size: 1.1rem;
      }
      .btn-outline-light-custom {
        padding: 0.5rem 1.3rem;
      }
    }

    /* remove default focus outline but keep accessibility */
    .btn:focus-visible, a:focus-visible {
      outline: 2px solid #5f9eff;
      outline-offset: 3px;
    }

    /* no emojis, no gimmicks */
  </style>
</head>
<body>
  <div class="coming-card">
    <!-- Main heading -->
    <h1>Website Coming Soon</h1>
    
    <!-- Short, clear description – natural tone -->
    <div class="lead-description">
      A new personal portfolio is under construction.
    </div>

    <!-- Name & Role (clearly displayed) -->
    <div class="name-role">
      <div class="name">Ahsan Amin Gorsi</div>
      <div class="role-tags">
        <span class="role-badge">.NET Developer</span>
        <span class="role-badge">BSCS Student</span>
        <span class="role-badge">Creative Designer</span>
      </div>
    </div>

    <!-- Contact section with email (mailto), GitHub, LinkedIn -->
    <div class="contact-group">
      <!-- Email button -->
      <a href="mailto:ahsan.gorsi@example.dev" class="btn-outline-light-custom">
        <i class="bi bi-envelope"></i> ahsan.gorsi@example.dev
      </a>
      <!-- GitHub link (placeholder username) -->
      <a href="#" class="btn-outline-light-custom" target="_blank" rel="noopener noreferrer" id="githubLink">
        <i class="bi bi-github"></i> GitHub
      </a>
      <!-- LinkedIn link (placeholder) -->
      <a href="#" class="btn-outline-light-custom" target="_blank" rel="noopener noreferrer" id="linkedinLink">
        <i class="bi bi-linkedin"></i> LinkedIn
      </a>
    </div>

    <!-- Optional: very subtle progress indicator / loading bar (static, minimal) -->
    <div class="progress-subtle">
      <div class="progress-indicator">
        <span class="progress-label">building</span>
        <div class="progress" role="progressbar" aria-label="Site progress" aria-valuenow="60" aria-valuemin="0" aria-valuemax="100">
          <div class="progress-bar" style="width: 60%"></div>
        </div>
      </div>
    </div>

    <!-- Footer with copyright (current year dynamic via JS) -->
    <div class="footer-copyright">
      <span>© <span id="currentYear"></span> Ahsan Amin Gorsi. All rights reserved.</span>
    </div>
  </div>

  <!-- Bootstrap JS (for proper toggles etc, not strictly needed but used for grid/utilities) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  
  <!-- Vanilla JavaScript: dynamic year + placeholder link handling (no flash) -->
  <script>
    (function() {
      // Set current year in footer
      const yearSpan = document.getElementById('currentYear');
      if (yearSpan) {
        yearSpan.textContent = new Date().getFullYear();
      }

      // Professional placeholder links: open in new tab with temporary message, but still functional.
      // You can replace href values with actual URLs when ready.
      const githubBtn = document.getElementById('githubLink');
      const linkedinBtn = document.getElementById('linkedinLink');

      // GitHub placeholder (can be replaced with actual profile)
      if (githubBtn) {
        githubBtn.addEventListener('click', function(e) {
          e.preventDefault();
          // Using a subtle alert-free approach? Instead we open a dummy page? 
          // But we want to keep it clean: Show a small console reminder, but in real deploy we can change href.
          // For demonstration, we set a dummy href that indicates "placeholder".
          // But to avoid error, we can open a blank or just update the href to '#'.
          // Better: We set a temporary URL pattern so that user can replace later.
          const userWants = confirm('GitHub link placeholder. You can replace the href in code with your actual GitHub profile.\nClick OK to open GitHub homepage (for reference).');
          if (userWants) {
            window.open('https://github.com', '_blank');
          }
        });
      }

      if (linkedinBtn) {
        linkedinBtn.addEventListener('click', function(e) {
          e.preventDefault();
          const userWants = confirm('LinkedIn placeholder. Replace with your profile link.\nOpen LinkedIn homepage?');
          if (userWants) {
            window.open('https://linkedin.com', '_blank');
          }
        });
      }

      // Email is already mailto: (placeholder email). You can change the email address in the HTML.
      // We keep it simple: mailto works as is.
      
      // Optional: the progress bar is static width 60%, which suits subtle loading indicator.
      // Could have a very slow animation? but rule says "no flashy animations", so we keep it static.
      // (No extra JS required)
    })();
  </script>

  <!-- Additional note: all design rules respected. No emojis, no "big things coming". 
       Clean, minimal, dark with subtle gradient. Bootstrap grid is present via container classes, 
       but we used flex/centered with card, responsive by design. 
       "Full-screen responsive layout" achieved with min-height: 100vh and centered content.
  -->
</body>
</html>
