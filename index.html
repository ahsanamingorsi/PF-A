<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
  <title>Ahsan Amin Gorsi · Coming Soon</title>
  
  <!-- Favicon (multiple sizes for compatibility) -->
  <link rel="icon" type="image/svg+xml" href="AAG Logo.png">
  <link rel="apple-touch-icon" href="AAG Logo.png">

  <!-- Bootstrap 5 + Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      transition: background 0.3s ease, color 0.2s ease;
    }

    /* Dark theme (default) */
    body.dark-theme {
      background: radial-gradient(circle at 30% 20%, #1a2538 0%, #0c101c 100%);
      color: #eef2fb;
    }

    /* Light theme */
    body.light-theme {
      background: radial-gradient(circle at 30% 20%, #f0f4fa 0%, #d9e2ef 100%);
      color: #1a2a3a;
    }

    /* Theme toggle button - fixed position */
    .theme-toggle {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 1000;
      width: 48px;
      height: 48px;
      border-radius: 40px;
      background: rgba(18, 25, 35, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(110, 160, 230, 0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.25s ease;
      color: #eef2fb;
      font-size: 1.5rem;
      box-shadow: 0 8px 18px rgba(0,0,0,0.2);
    }

    .light-theme .theme-toggle {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(60, 100, 150, 0.3);
      color: #1e3a5f;
      box-shadow: 0 8px 18px rgba(0,0,0,0.08);
    }

    .theme-toggle:hover {
      transform: scale(1.05);
      background: rgba(50, 80, 130, 0.5);
      border-color: #5f9eff;
    }

    .light-theme .theme-toggle:hover {
      background: rgba(220, 235, 255, 0.9);
    }

    /* Main card */
    .coming-card {
      background: rgba(18, 25, 35, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(72, 120, 200, 0.18);
      border-radius: 32px;
      padding: 2.8rem 2.4rem;
      max-width: 800px;
      width: 100%;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(62, 140, 255, 0.05) inset;
      transition: background 0.3s ease, border-color 0.3s, box-shadow 0.3s;
    }

    body.light-theme .coming-card {
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(100, 140, 200, 0.2);
      box-shadow: 0 20px 40px rgba(0, 20, 40, 0.15), 0 0 0 1px rgba(255,255,255,0.5) inset;
    }

    /* Logo image area */
    .logo-wrapper {
      display: flex;
      justify-content: center;
      margin-bottom: 1.8rem;
    }

    .logo-img {
      width: 90px;
      height: 90px;
      border-radius: 24px;
      object-fit: cover;
      background: linear-gradient(145deg, #1e3a5f, #0f1a2b);
      padding: 8px;
      box-shadow: 0 12px 24px -8px rgba(0,0,0,0.5);
      border: 1.5px solid rgba(100, 170, 255, 0.3);
      transition: all 0.2s;
    }

    body.light-theme .logo-img {
      background: linear-gradient(145deg, #d6e4ff, #b6cce5);
      box-shadow: 0 12px 24px -8px rgba(0,20,50,0.2);
      border: 1.5px solid rgba(40, 100, 180, 0.25);
    }

    /* Typography */
    h1 {
      font-weight: 500;
      font-size: 3.4rem;
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
      line-height: 1.2;
    }

    body.dark-theme h1 { color: #ffffff; }
    body.light-theme h1 { color: #0b1e2e; }

    .lead-description {
      font-size: 1.2rem;
      font-weight: 400;
      margin-bottom: 2.2rem;
      border-left: 3px solid #3d7ed9;
      padding-left: 1.4rem;
    }

    body.dark-theme .lead-description { color: #b4c8e9; }
    body.light-theme .lead-description { color: #2c4058; border-left-color: #2a6bb0; }

    .name-role {
      margin-bottom: 2.8rem;
    }

    .name {
      font-size: 2.2rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin-bottom: 0.5rem;
    }

    body.dark-theme .name { color: #ffffff; }
    body.light-theme .name { color: #0a1c2c; }

    .role-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem 1rem;
    }

    .role-badge {
      font-size: 1rem;
      font-weight: 450;
      padding: 0.25rem 1rem;
      border-radius: 40px;
      backdrop-filter: blur(4px);
      transition: all 0.2s;
    }

    body.dark-theme .role-badge {
      color: #ccddf8;
      background: rgba(54, 108, 194, 0.18);
      border: 0.5px solid rgba(90, 156, 255, 0.2);
    }

    body.light-theme .role-badge {
      color: #1a344c;
      background: rgba(60, 110, 180, 0.12);
      border: 0.5px solid rgba(30, 100, 200, 0.25);
    }

    /* Contact buttons */
    .contact-group {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin: 2.2rem 0 2rem 0;
    }

    .btn-custom {
      border: 1.5px solid;
      font-weight: 500;
      padding: 0.65rem 1.8rem;
      border-radius: 48px;
      background: transparent;
      transition: all 0.2s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      backdrop-filter: blur(5px);
    }

    body.dark-theme .btn-custom {
      color: #e3ecff;
      border-color: #3a6792;
      background: rgba(20, 35, 55, 0.35);
    }

    body.light-theme .btn-custom {
      color: #1e3b5a;
      border-color: #5a7fa0;
      background: rgba(230, 242, 255, 0.55);
    }

    .btn-custom:hover {
      transform: translateY(-1px);
    }

    body.dark-theme .btn-custom:hover {
      background: #1f3a60;
      border-color: #5f9eff;
      color: white;
      box-shadow: 0 0 12px rgba(70, 140, 255, 0.2);
    }

    body.light-theme .btn-custom:hover {
      background: #c9ddf5;
      border-color: #2a6bb0;
      color: #082032;
      box-shadow: 0 4px 12px rgba(0,70,150,0.12);
    }

    .btn-custom i {
      font-size: 1.25rem;
    }

    /* subtle progress */
    .progress-subtle {
      margin-top: 1.8rem;
      margin-bottom: 2.2rem;
    }

    .progress-indicator {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .progress-label {
      font-size: 0.8rem;
      font-weight: 450;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    body.dark-theme .progress-label { color: #9ab9e6; }
    body.light-theme .progress-label { color: #2e5470; }

    .progress {
      height: 3px;
      border-radius: 50px;
      flex: 1;
    }

    body.dark-theme .progress {
      background: rgba(70, 110, 160, 0.2);
    }

    body.light-theme .progress {
      background: rgba(70, 110, 160, 0.15);
    }

    .progress-bar {
      width: 60%;
      border-radius: 50px;
      opacity: 0.9;
      box-shadow: 0 0 6px #3d7ed9;
    }

    body.dark-theme .progress-bar { background: #6da5ff; }
    body.light-theme .progress-bar { background: #2a6bb0; }

    /* footer */
    .footer-copyright {
      font-size: 0.8rem;
      border-top: 0.5px solid;
      padding-top: 1.8rem;
      margin-top: 0.5rem;
      text-align: center;
    }

    body.dark-theme .footer-copyright {
      color: #7f99c0;
      border-top-color: rgba(110, 150, 210, 0.2);
    }

    body.light-theme .footer-copyright {
      color: #3f5e7a;
      border-top-color: rgba(60, 100, 150, 0.2);
    }

    @media (max-width: 576px) {
      .coming-card { padding: 2rem 1.5rem; }
      h1 { font-size: 2.5rem; }
      .name { font-size: 1.8rem; }
      .lead-description { font-size: 1.1rem; }
      .btn-custom { padding: 0.5rem 1.3rem; }
      .theme-toggle { top: 16px; right: 16px; width: 44px; height: 44px; }
      .logo-img { width: 75px; height: 75px; }
    }
  </style>
</head>
<body class="dark-theme">
  <!-- Theme toggle button -->
  <div class="theme-toggle" id="themeToggle" role="button" tabindex="0" aria-label="Switch theme">
    <i class="bi bi-sun-fill" id="themeIcon"></i>
  </div>

  <div class="coming-card">
    <!-- Logo image (SVG based, modern) -->
    <div class="logo-wrapper">
      <img class="logo-img" src="AAG Logo.png"
           alt="Ahsan Amin Gorsi logo">
    </div>

    <!-- Main heading -->
    <h1>Website Coming Soon</h1>
    
    <div class="lead-description">
      A new personal portfolio is under construction.
    </div>

    <!-- Name & Role -->
    <div class="name-role">
      <div class="name">Ahsan Amin Gorsi</div>
      <div class="role-tags">
        <span class="role-badge">.NET Developer</span>
        <span class="role-badge">BSCS Student</span>
        <span class="role-badge">Creative Designer</span>
      </div>
    </div>

    <!-- Contact: Email, GitHub, LinkedIn, WhatsApp -->
    <div class="contact-group">
      <a href="mailto:ahsanamingorsi@gmail.com" class="btn-custom">
        <i class="bi bi-envelope"></i> Email
      </a>
      <a href="https://github.com/ahsanamingorsi" class="btn-custom" id="githubLink" target="_blank" rel="noopener">
        <i class="bi bi-github"></i> GitHub
      </a>
      <a href="https://www.linkedin.com/in/ahsanamingorsi " class="btn-custom" id="linkedinLink" target="_blank" rel="noopener">
        <i class="bi bi-linkedin"></i> LinkedIn
      </a>
      <!-- WhatsApp contact (with placeholder number) -->
      <a href="https://wa.me/923495473628" class="btn-custom" id="whatsappLink" target="_blank" rel="noopener">
        <i class="bi bi-whatsapp"></i> WhatsApp
      </a>
    </div>

    <!-- Subtle progress -->
    <div class="progress-subtle">
      <div class="progress-indicator">
        <span class="progress-label">building</span>
        <div class="progress" role="progressbar" aria-label="Site progress" aria-valuenow="60" aria-valuemin="0" aria-valuemax="100">
          <div class="progress-bar" style="width: 60%"></div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer-copyright">
      <span>© <span id="currentYear"></span> Ahsan Amin Gorsi. All rights reserved.</span>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  
  <script>
    (function() {
      // ----- THEME TOGGLE (dark / light) -----
      const body = document.body;
      const themeToggle = document.getElementById('themeToggle');
      const themeIcon = document.getElementById('themeIcon');
      
      // Default: dark-theme (already set), icon shows sun (meaning switch to light)
      function updateThemeUI() {
        if (body.classList.contains('dark-theme')) {
          themeIcon.className = 'bi bi-sun-fill';  // sun = switch to light
        } else {
          themeIcon.className = 'bi bi-moon-stars-fill'; // moon = switch to dark
        }
      }
      
      themeToggle.addEventListener('click', () => {
        if (body.classList.contains('dark-theme')) {
          body.classList.remove('dark-theme');
          body.classList.add('light-theme');
        } else {
          body.classList.remove('light-theme');
          body.classList.add('dark-theme');
        }
        updateThemeUI();
      });

      // Keyboard accessibility for theme toggle
      themeToggle.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          themeToggle.click();
        }
      });
      updateThemeUI();

      // ----- DYNAMIC YEAR -----
      document.getElementById('currentYear').textContent = new Date().getFullYear();

      // ----- PLACEHOLDER LINKS (professional, without emojis) -----
      const githubBtn = document.getElementById('githubLink');
      const linkedinBtn = document.getElementById('linkedinLink');
      const whatsappBtn = document.getElementById('whatsappLink');

      // Helper to open placeholder with confirmation (clean UX)
      function handlePlaceholder(e, serviceName, fallbackUrl) {
        e.preventDefault();
        const message = `${serviceName} link is a placeholder. You can replace the href in the code.\nOpen ${serviceName} homepage for reference?`;
        if (confirm(message)) {
          window.open(fallbackUrl, '_blank');
        }
      }

      if (githubBtn) {
        githubBtn.addEventListener('click', (e) => handlePlaceholder(e, 'GitHub', 'https://github.com'));
      }
      if (linkedinBtn) {
        linkedinBtn.addEventListener('click', (e) => handlePlaceholder(e, 'LinkedIn', 'https://linkedin.com'));
      }
      if (whatsappBtn) {
        whatsappBtn.addEventListener('click', (e) => {
          e.preventDefault();
          // WhatsApp can use wa.me link; we provide a placeholder number (replace with actual)
          const placeholderNumber = '1234567890'; // Replace with your WhatsApp number (with country code, no +)
          const message = 'WhatsApp contact placeholder. Replace the number in code.\nOpen WhatsApp Web demo?';
          if (confirm(message)) {
            window.open(`https://wa.me/${placeholderNumber}`, '_blank');
          }
        });
      }

      // Email is mailto: (you can change email in HTML)

      // Optional: subtle hover improvement for logo (no animation needed)
    })();
  </script>
  <!-- Note: Favicon already embedded. Logo image is an inline SVG that matches dark/light adaptation. -->
</body>
</html>
