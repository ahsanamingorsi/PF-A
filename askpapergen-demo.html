<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Examination Paper Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Paper Form CSS */
        .control-panel {
            background-color: white;
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 2px 15px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }

        .control-panel h2 {
            margin-bottom: 1.5rem;
            color: #1a365d;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #4a5568;
            font-size: 0.9rem;
        }

        .form-control, .form-select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        .form-control:focus, .form-select:focus {
            outline: none;
            border-color: #4299e1;
            box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.1);
        }

        textarea.form-control {
            min-height: 120px;
            resize: vertical;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            font-size: 0.95rem;
        }

        .btn i {
            margin-right: 8px;
        }

        .btn-primary {
            background-color: #1a365d;
            color: white;
        }

        .btn-primary:hover {
            background-color: #2c5282;
        }

        .btn-outline-secondary {
            background-color: transparent;
            border: 1px solid #e2e8f0;
            color: #4a5568;
        }

        .btn-outline-secondary:hover {
            background-color: #f8f9fa;
        }

        .btn-outline-danger {
            background-color: transparent;
            border: 1px solid #e2e8f0;
            color: #dc3545;
        }

        .btn-outline-danger:hover {
            background-color: #f8f9fa;
        }

        .action-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .question-management {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .section-editor {
            margin-top: 1.5rem;
        }

        .questions-container {
            margin-top: 1rem;
        }

        .mcq-options-container, .table-container {
            margin-top: 1rem;
            padding: 1rem;
            background-color: #f8f9fa;
            border-radius: 6px;
        }

        .option-row, .table-row {
            display: flex;
            gap: 1rem;
            margin-bottom: 0.5rem;
            align-items: center;
        }

        .size-controls {
            display: flex;
            gap: 1rem;
            margin: 0.5rem 0;
            align-items: center;
        }

        .size-control {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .size-control input {
            width: 80px;
        }

        .preview-image {
            max-width: 100%;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            display: block;
            margin: 0.5rem auto;
        }

        .preview-table {
            border-collapse: collapse;
            margin: 0.5rem 0;
        }

        .preview-table, .preview-table th, .preview-table td {
            border: 1px solid #dee2e6;
        }

        .preview-table th, .preview-table td {
            padding: 0.3rem;
            text-align: left;
            font-size: 0.9rem;
        }

        /* Preview specific styles */
        .question-paper {
            font-family: 'Times New Roman', serif;
            line-height: 1.6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            background-color: white;
            padding: 2rem;
            box-shadow: 0 0 5px rgba(0,0,0,0.05);
            position: relative;
            font-size: 12pt;
        }
        
        .university-header {
            text-align: center;
            margin-bottom: 1.5rem;
            position: relative;
        }
        
        .university-header::after {
            content: '';
            display: block;
            width: 100px;
            height: 2px;
            background-color: #1a365d;
            margin: 0.5rem auto 0;
        }
        
        .paper-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin: 1rem 0;
            text-align: center;
            color: #1a365d;
            text-transform: uppercase;
        }
        
        .paper-meta {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }
        
        .instructions {
            background-color: #f8f8f8;
            padding: 1rem;
            margin-bottom: 1.5rem;
            border-left: 3px solid #1a365d;
            font-size: 0.9rem;
        }
        
        .section {
            margin-bottom: 2rem;
        }
        
        .section-title {
            font-weight: bold;
            font-size: 1rem;
            margin-bottom: 1rem;
            padding-bottom: 0.3rem;
            border-bottom: 1px solid #e2e8f0;
            color: #1a365d;
        }
        
        .question {
            margin-bottom: 1rem;
            position: relative;
            padding-left: 1.5rem;
        }
        
        .question-number {
            position: absolute;
            left: 0;
            font-weight: bold;
        }
        
        .question-content {
            flex: 1;
        }
        
        .question-text {
            margin-bottom: 0.3rem;
        }
        
        .question-marks {
            font-weight: bold;
            color: #1a365d;
            float: right;
            margin-left: 0.5rem;
            font-size: 0.9rem;
        }
        
        .options {
            margin-left: 1rem;
            margin-top: 0.3rem;
        }
        
        .option {
            margin-bottom: 0.2rem;
            position: relative;
            padding-left: 1rem;
            font-size: 0.9rem;
        }
        
        .option::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0.5em;
            width: 0.4em;
            height: 0.4em;
            border-radius: 50%;
            background-color: #1a365d;
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .question-management {
                flex-direction: column;
            }
            
            .size-controls {
                flex-direction: column;
                align-items: flex-start;
            }
        }

        .page-limit-warning {
            color: #dc3545;
            font-size: 0.9rem;
            margin-top: 0.5rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container py-4">
        <!-- Paper Form -->
        <div class="control-panel">
            <h2>Paper Details</h2>
            
            <div class="row mb-3">
                <div class="col-md-6">
                    <label for="exam-title" class="form-label">Exam Title</label>
                    <input type="text" id="exam-title" class="form-control" value="Annual Examination 2023">
                </div>
                
                <div class="col-md-6">
                    <label for="subject" class="form-label">Subject</label>
                    <input type="text" id="subject" class="form-control" value="Computer Science">
                </div>
            </div>
            
            <div class="row mb-3">
                <div class="col-md-6">
                    <label for="class" class="form-label">Degree Program</label>
                    <input type="text" id="class" class="form-control" value="BS Computer Science">
                </div>
                
                <div class="col-md-3">
                    <label for="time-duration" class="form-label">Time Duration</label>
                    <input type="text" id="time-duration" class="form-control" value="3 Hours">
                </div>
                
                <div class="col-md-3">
                    <label for="max-marks" class="form-label">Maximum Marks</label>
                    <input type="text" id="max-marks" class="form-control" value="100">
                </div>
            </div>
            
            <div class="mb-3">
                <label for="instructions" class="form-label">General Instructions</label>
                <textarea id="instructions" class="form-control" rows="4">1. All questions are compulsory.
2. Write your answers neatly and legibly.
3. Figures to the right indicate full marks.
4. Use of unauthorized materials is prohibited.
5. Mobile phones are not allowed in examination hall.</textarea>
            </div>
        </div>
        
        <!-- Question Management -->
        <div class="control-panel">
            <h2>Question Management</h2>
            
            <div class="question-management">
                <button id="add-section-btn" class="btn btn-outline-secondary">
                    <i class="fas fa-plus"></i> Add Section
                </button>
                
                <div class="d-flex flex-grow-1 gap-2">
                    <select id="question-type" class="form-select">
                        <option value="short">Short Answer</option>
                        <option value="long">Long Answer</option>
                        <option value="mcq">Multiple Choice</option>
                        <option value="true-false">True/False</option>
                    </select>
                    
                    <input type="number" id="question-marks" class="form-control" style="width: 100px;" value="5" min="1" max="20">
                    
                    <button id="add-question-btn" class="btn btn-primary">
                        <i class="fas fa-plus"></i> Add Question
                    </button>
                </div>
            </div>
            
            <div id="sections-container">
                <!-- Default Section -->
                <div class="section-editor">
                    <div class="d-flex align-items-center mb-3">
                        <input type="text" class="form-control section-title" value="Section A (Short Answer Questions)">
                    </div>
                    <div class="questions-container" data-section-id="0">
                        <div class="question-item">
                            <div class="d-flex gap-2 mb-2">
                                <input type="text" class="form-control question-text" value="Define algorithm and discuss its characteristics.">
                                <select class="form-select question-type" style="width: 150px;">
                                    <option value="short" selected>Short</option>
                                    <option value="long">Long</option>
                                    <option value="mcq">MCQ</option>
                                    <option value="true-false">True/False</option>
                                </select>
                                <input type="number" class="form-control question-mark" style="width: 80px;" value="5" min="1">
                                <button class="btn btn-outline-danger delete-question">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                            
                            <!-- Image Upload -->
                            <div class="mb-3">
                                <label class="form-label">Add Image (optional)</label>
                                <input type="file" class="form-control question-image" accept="image/*">
                                <div class="size-controls">
                                    <div class="size-control">
                                        <label>Width:</label>
                                        <input type="number" class="form-control form-control-sm image-width" value="200" min="50" max="400">
                                        <span>px</span>
                                    </div>
                                    <div class="size-control">
                                        <label>Height:</label>
                                        <input type="number" class="form-control form-control-sm image-height" value="150" min="50" max="300">
                                        <span>px</span>
                                    </div>
                                </div>
                            </div>
                            
                            <!-- Table Data Button -->
                            <div class="mb-3">
                                <button type="button" class="btn btn-sm btn-outline-primary add-table-btn">
                                    <i class="fas fa-table"></i> Add Table (optional)
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="action-buttons">
                <button id="generate-btn" class="btn btn-primary">
                    <i class="fas fa-sync-alt"></i> Generate Paper
                </button>
            </div>
            
            <div class="page-limit-warning" id="page-limit-warning">
                <i class="fas fa-exclamation-triangle"></i> Warning: Content may exceed one page. Consider reducing image/table sizes or removing some questions.
            </div>
        </div>
        
        <!-- Paper Preview -->
        <div class="control-panel mt-4" id="preview-container" style="display: none;">
            <h2>Paper Preview</h2>
            <div id="question-paper-preview"></div>
            <div class="action-buttons">
                <button id="print-btn" class="btn btn-primary">
                    <i class="fas fa-print"></i> Print Paper
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            let sectionCounter = 1;
            const MAX_PAGE_HEIGHT = 1000; // Approximate max height for 1 page
            
            // Add Section Button
            document.getElementById('add-section-btn').addEventListener('click', function() {
                const sectionId = sectionCounter++;
                const sectionHtml = `
                    <div class="section-editor">
                        <div class="d-flex align-items-center mb-3">
                            <input type="text" class="form-control section-title" value="Section ${String.fromCharCode(65 + sectionId)}">
                            <button class="btn btn-outline-danger ms-2 delete-section">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                        <div class="questions-container" data-section-id="${sectionId}"></div>
                    </div>
                `;
                document.getElementById('sections-container').insertAdjacentHTML('beforeend', sectionHtml);
                
                document.querySelector('.section-editor:last-child .delete-section').addEventListener('click', function() {
                    this.closest('.section-editor').remove();
                });
            });
            
            // Add Question Button
            document.getElementById('add-question-btn').addEventListener('click', function() {
                const sections = document.querySelectorAll('.section-editor');
                if (sections.length === 0) {
                    alert('Please add a section first!');
                    return;
                }
                
                const lastSection = sections[sections.length - 1];
                const questionsContainer = lastSection.querySelector('.questions-container');
                const sectionId = questionsContainer.getAttribute('data-section-id');
                const questionType = document.getElementById('question-type').value;
                const questionMarks = document.getElementById('question-marks').value;
                
                const questionHtml = `
                    <div class="question-item">
                        <div class="d-flex gap-2 mb-2">
                            <input type="text" class="form-control question-text" value="New question">
                            <select class="form-select question-type" style="width: 150px;">
                                <option value="short" ${questionType === 'short' ? 'selected' : ''}>Short</option>
                                <option value="long" ${questionType === 'long' ? 'selected' : ''}>Long</option>
                                <option value="mcq" ${questionType === 'mcq' ? 'selected' : ''}>MCQ</option>
                                <option value="true-false" ${questionType === 'true-false' ? 'selected' : ''}>True/False</option>
                            </select>
                            <input type="number" class="form-control question-mark" style="width: 80px;" min="1" value="${questionMarks}">
                            <button class="btn btn-outline-danger delete-question">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                        
                        <!-- Image Upload -->
                        <div class="mb-3">
                            <label class="form-label">Add Image (optional)</label>
                            <input type="file" class="form-control question-image" accept="image/*">
                            <div class="size-controls">
                                <div class="size-control">
                                    <label>Width:</label>
                                    <input type="number" class="form-control form-control-sm image-width" value="200" min="50" max="400">
                                    <span>px</span>
                                </div>
                                <div class="size-control">
                                    <label>Height:</label>
                                    <input type="number" class="form-control form-control-sm image-height" value="150" min="50" max="300">
                                    <span>px</span>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Table Data Button -->
                        <div class="mb-3">
                            <button type="button" class="btn btn-sm btn-outline-primary add-table-btn">
                                <i class="fas fa-table"></i> Add Table (optional)
                            </button>
                        </div>
                        
                        <!-- MCQ Options (only shown for MCQ type) -->
                        <div class="mcq-options-container" style="${questionType === 'mcq' ? '' : 'display: none;'}">
                            <label class="form-label">MCQ Options</label>
                            <div class="options-list">
                                <div class="option-row">
                                    <input type="text" class="form-control form-control-sm option-text" placeholder="Option 1">
                                    <button class="btn btn-sm btn-outline-danger delete-option">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </div>
                                <div class="option-row">
                                    <input type="text" class="form-control form-control-sm option-text" placeholder="Option 2">
                                    <button class="btn btn-sm btn-outline-danger delete-option">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </div>
                            </div>
                            <button type="button" class="btn btn-sm btn-outline-secondary mt-2 add-option">
                                <i class="fas fa-plus"></i> Add Option
                            </button>
                        </div>
                    </div>
                `;
                questionsContainer.insertAdjacentHTML('beforeend', questionHtml);
                
                const newQuestion = questionsContainer.lastElementChild;
                
                // Delete question button
                newQuestion.querySelector('.delete-question').addEventListener('click', function() {
                    this.closest('.question-item').remove();
                });
                
                // Show/hide MCQ options
                newQuestion.querySelector('.question-type').addEventListener('change', function() {
                    const mcqContainer = this.closest('.question-item').querySelector('.mcq-options-container');
                    mcqContainer.style.display = this.value === 'mcq' ? 'block' : 'none';
                });
                
                // Add MCQ option
                newQuestion.querySelector('.add-option').addEventListener('click', function() {
                    const optionsList = this.closest('.mcq-options-container').querySelector('.options-list');
                    const optionCount = optionsList.querySelectorAll('.option-row').length + 1;
                    const optionHtml = `
                        <div class="option-row">
                            <input type="text" class="form-control form-control-sm option-text" placeholder="Option ${optionCount}">
                            <button class="btn btn-sm btn-outline-danger delete-option">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    `;
                    optionsList.insertAdjacentHTML('beforeend', optionHtml);
                    
                    optionsList.lastElementChild.querySelector('.delete-option').addEventListener('click', function() {
                        this.closest('.option-row').remove();
                    });
                });
                
                // Add table button
                newQuestion.querySelector('.add-table-btn').addEventListener('click', function() {
                    const tableContainer = document.createElement('div');
                    tableContainer.className = 'table-container';
                    tableContainer.innerHTML = `
                        <label class="form-label">Table Data</label>
                        <div class="size-controls">
                            <div class="size-control">
                                <label>Font Size:</label>
                                <input type="number" class="form-control form-control-sm table-font-size" value="12" min="8" max="16">
                                <span>pt</span>
                            </div>
                            <div class="size-control">
                                <label>Cell Padding:</label>
                                <input type="number" class="form-control form-control-sm table-padding" value="3" min="1" max="8">
                                <span>px</span>
                            </div>
                        </div>
                        <div class="mb-2">
                            <button type="button" class="btn btn-sm btn-outline-secondary add-table-row">
                                <i class="fas fa-plus"></i> Add Row
                            </button>
                            <button type="button" class="btn btn-sm btn-outline-secondary add-table-col">
                                <i class="fas fa-plus"></i> Add Column
                            </button>
                            <button type="button" class="btn btn-sm btn-outline-danger remove-table">
                                <i class="fas fa-trash"></i> Remove Table
                            </button>
                        </div>
                        <div class="table-data">
                            <div class="table-row">
                                <input type="text" class="form-control form-control-sm" placeholder="Header 1">
                                <input type="text" class="form-control form-control-sm" placeholder="Header 2">
                                <button class="btn btn-sm btn-outline-danger delete-table-col">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                            <div class="table-row">
                                <input type="text" class="form-control form-control-sm" placeholder="Data 1">
                                <input type="text" class="form-control form-control-sm" placeholder="Data 2">
                                <button class="btn btn-sm btn-outline-danger delete-table-col">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </div>
                    `;
                    
                    this.parentElement.parentElement.insertBefore(tableContainer, this.parentElement.nextSibling);
                    
                    const container = tableContainer;
                    
                    // Add table functionality
                    container.querySelector('.add-table-row').addEventListener('click', function() {
                        const tableData = container.querySelector('.table-data');
                        const firstRow = tableData.querySelector('.table-row');
                        const colCount = firstRow.querySelectorAll('input').length;
                        
                        let rowHtml = '<div class="table-row">';
                        for (let i = 0; i < colCount; i++) {
                            rowHtml += `<input type="text" class="form-control form-control-sm" placeholder="Data">`;
                        }
                        rowHtml += `<button class="btn btn-sm btn-outline-danger delete-table-col">
                                        <i class="fas fa-trash"></i>
                                    </button>`;
                        rowHtml += '</div>';
                        
                        tableData.insertAdjacentHTML('beforeend', rowHtml);
                        
                        tableData.lastElementChild.querySelector('.delete-table-col').addEventListener('click', function() {
                            const row = this.closest('.table-row');
                            if (row.querySelectorAll('input').length > 1) {
                                row.removeChild(row.querySelector('input:last-of-type'));
                            }
                        });
                    });
                    
                    container.querySelector('.add-table-col').addEventListener('click', function() {
                        const tableRows = container.querySelectorAll('.table-row');
                        
                        tableRows.forEach(row => {
                            const newCol = document.createElement('input');
                            newCol.type = 'text';
                            newCol.className = 'form-control form-control-sm';
                            newCol.placeholder = row === tableRows[0] ? 'Header' : 'Data';
                            
                            const deleteBtn = row.querySelector('.delete-table-col');
                            row.insertBefore(newCol, deleteBtn);
                        });
                    });
                    
                    container.querySelector('.remove-table').addEventListener('click', function() {
                        container.remove();
                    });
                    
                    container.querySelectorAll('.delete-table-col').forEach(btn => {
                        btn.addEventListener('click', function() {
                            const row = this.closest('.table-row');
                            if (row.querySelectorAll('input').length > 1) {
                                row.removeChild(row.querySelector('input:last-of-type'));
                            }
                        });
                    });
                });
            });
            
            // Generate Paper Button
            document.getElementById('generate-btn').addEventListener('click', function() {
                const examTitle = document.getElementById('exam-title').value;
                const subject = document.getElementById('subject').value;
                const degreeProgram = document.getElementById('class').value;
                const timeDuration = document.getElementById('time-duration').value;
                const maxMarks = document.getElementById('max-marks').value;
                const instructions = document.getElementById('instructions').value.split('\n');
                
                let sectionsHtml = '';
                const sections = document.querySelectorAll('.section-editor');
                
                sections.forEach((section, sectionIndex) => {
                    const sectionTitle = section.querySelector('.section-title').value;
                    const questions = section.querySelectorAll('.question-item');
                    
                    sectionsHtml += `
                        <div class="section">
                            <div class="section-title">${sectionTitle}</div>
                    `;
                    
                    questions.forEach((question, qIndex) => {
                        const questionText = question.querySelector('.question-text').value;
                        const questionMarks = question.querySelector('.question-mark').value;
                        const questionType = question.querySelector('.question-type').value;
                        
                        sectionsHtml += `
                            <div class="question">
                                <div class="question-number">${qIndex + 1}.</div>
                                <div class="question-content">
                                    <div class="question-text">${questionText}</div>
                                    <div class="question-marks">[${questionMarks}]</div>
                                </div>
                        `;
                        
                        // Add image if exists
                        const imageInput = question.querySelector('.question-image');
                        if (imageInput && imageInput.files.length > 0) {
                            const imageUrl = URL.createObjectURL(imageInput.files[0]);
                            const imageWidth = question.querySelector('.image-width')?.value || '200';
                            const imageHeight = question.querySelector('.image-height')?.value || '150';
                            
                            sectionsHtml += `
                                <div style="text-align: center; margin: 0.5rem 0;">
                                    <img src="${imageUrl}" style="max-width: ${imageWidth}px; max-height: ${imageHeight}px; border: 1px solid #dee2e6; border-radius: 4px;">
                                </div>
                            `;
                        }
                        
                        // Add MCQ options if MCQ type
                        if (questionType === 'mcq') {
                            const options = question.querySelectorAll('.option-text');
                            if (options.length > 0) {
                                sectionsHtml += `<div class="options">`;
                                options.forEach((option, index) => {
                                    if (option.value) {
                                        sectionsHtml += `
                                            <div class="option">
                                                <span class="option-letter">${String.fromCharCode(97 + index)})</span>
                                                ${option.value}
                                            </div>
                                        `;
                                    }
                                });
                                sectionsHtml += `</div>`;
                            }
                        }
                        
                        // Add table if exists
                        const tableContainer = question.querySelector('.table-container');
                        if (tableContainer) {
                            const tableRows = tableContainer.querySelectorAll('.table-row');
                            if (tableRows.length > 0) {
                                const fontSize = tableContainer.querySelector('.table-font-size')?.value || '12';
                                const padding = tableContainer.querySelector('.table-padding')?.value || '3';
                                
                                sectionsHtml += `<table class="preview-table" style="font-size: ${fontSize}pt; border-collapse: collapse; margin: 0.5rem 0;">`;
                                
                                // Add header row
                                sectionsHtml += `<tr>`;
                                tableRows[0].querySelectorAll('input').forEach(input => {
                                    sectionsHtml += `<th style="border: 1px solid #dee2e6; padding: ${padding}px; text-align: left; font-weight: bold;">${input.value || 'Header'}</th>`;
                                });
                                sectionsHtml += `</tr>`;
                                
                                // Add data rows
                                for (let i = 1; i < tableRows.length; i++) {
                                    sectionsHtml += `<tr>`;
                                    tableRows[i].querySelectorAll('input').forEach(input => {
                                        sectionsHtml += `<td style="border: 1px solid #dee2e6; padding: ${padding}px; text-align: left;">${input.value || 'Data'}</td>`;
                                    });
                                    sectionsHtml += `</tr>`;
                                }
                                
                                sectionsHtml += `</table>`;
                            }
                        }
                        
                        sectionsHtml += `</div>`; // Close question div
                    });
                    
                    sectionsHtml += `</div>`; // Close section div
                });
                
                const previewHtml = `
                    <div class="question-paper">
                        <div class="university-header">
                            <div style="font-size: 1.4rem; font-weight: bold; color: #1a365d;">
                                University of Kotli
                            </div>
                            <div style="font-size: 1.1rem; margin-top: 0.3rem;">
                                Azad Jammu & Kashmir
                            </div>
                        </div>
                        
                        <div class="paper-title">${examTitle}</div>
                        
                        <div class="paper-meta">
                            <div><strong>Subject:</strong> ${subject}</div>
                            <div><strong>Program:</strong> ${degreeProgram}</div>
                        </div>
                        
                        <div class="paper-meta">
                            <div><strong>Time Allowed:</strong> ${timeDuration}</div>
                            <div><strong>Maximum Marks:</strong> ${maxMarks}</div>
                        </div>
                        
                        <div class="instructions">
                            <div><strong>Instructions:</strong></div>
                            ${instructions.map(i => `<div>${i}</div>`).join('')}
                        </div>
                        
                        ${sectionsHtml}
                    </div>
                `;
                
                document.getElementById('question-paper-preview').innerHTML = previewHtml;
                document.getElementById('preview-container').style.display = 'block';
                
                // Check page height
                const previewHeight = document.getElementById('question-paper-preview').scrollHeight;
                const warningElement = document.getElementById('page-limit-warning');
                if (previewHeight > MAX_PAGE_HEIGHT) {
                    warningElement.style.display = 'block';
                } else {
                    warningElement.style.display = 'none';
                }
                
                document.getElementById('preview-container').scrollIntoView({ behavior: 'smooth' });
            });
            
            // Print Button
            document.getElementById('print-btn').addEventListener('click', function() {
                const printWindow = window.open('', '', 'width=800,height=600');
                const previewContent = document.getElementById('question-paper-preview').innerHTML;
                
                printWindow.document.write(`
                    <!DOCTYPE html>
                    <html>
                    <head>
                        <title>Exam Paper</title>
                        <style>
                            body {
                                font-family: 'Times New Roman', serif;
                                line-height: 1.6;
                                color: #333;
                                padding: 1.5cm;
                                margin: 0;
                                font-size: 12pt;
                            }
                            .question-paper {
                                max-width: 100%;
                                padding: 0;
                            }
                            .university-header {
                                text-align: center;
                                margin-bottom: 1cm;
                            }
                            .paper-title {
                                font-size: 1.2rem;
                                font-weight: bold;
                                margin: 0.8cm 0;
                                text-align: center;
                                text-transform: uppercase;
                            }
                            .paper-meta {
                                display: flex;
                                justify-content: space-between;
                                margin-bottom: 1cm;
                                font-size: 0.9rem;
                            }
                            .instructions {
                                background-color: #f8f8f8;
                                padding: 0.8rem;
                                margin-bottom: 1cm;
                                border-left: 3px solid #1a365d;
                                font-size: 0.9rem;
                            }
                            .section {
                                margin-bottom: 0.8cm;
                                page-break-inside: avoid;
                            }
                            .section-title {
                                font-weight: bold;
                                font-size: 1rem;
                                margin-bottom: 0.5cm;
                                padding-bottom: 0.2cm;
                                border-bottom: 1px solid #e2e8f0;
                            }
                            .question {
                                margin-bottom: 0.5cm;
                                position: relative;
                                padding-left: 1cm;
                                page-break-inside: avoid;
                            }
                            .question-number {
                                position: absolute;
                                left: 0;
                                font-weight: bold;
                            }
                            .question-marks {
                                font-weight: bold;
                                color: #1a365d;
                                float: right;
                                margin-left: 0.5cm;
                                font-size: 0.9rem;
                            }
                            .question-image-preview {
                                text-align: center;
                                margin: 0.3cm 0;
                            }
                            .question-image-preview img {
                                max-width: 100%;
                                display: block;
                                margin: 0 auto;
                            }
                            .options {
                                margin-left: 1cm;
                                margin-top: 0.2cm;
                            }
                            .option {
                                margin-bottom: 0.1cm;
                                position: relative;
                                padding-left: 0.8cm;
                                font-size: 0.9rem;
                            }
                            .option-letter {
                                position: absolute;
                                left: 0;
                            }
                            .preview-table {
                                width: 100%;
                                margin: 0.3cm 0;
                                border-collapse: collapse;
                                page-break-inside: avoid;
                            }
                            .preview-table, .preview-table th, .preview-table td {
                                border: 1px solid #dee2e6;
                            }
                            .preview-table th, .preview-table td {
                                padding: 0.2cm;
                                text-align: left;
                            }
                            @page {
                                size: A4;
                                margin: 1.5cm;
                            }
                            @media print {
                                body {
                                    padding: 0;
                                    margin: 0;
                                }
                                .question-paper {
                                    padding: 0;
                                    box-shadow: none;
                                }
                            }
                        </style>
                    </head>
                    <body>
                        ${previewContent}
                        <script>
                            window.onload = function() {
                                window.print();
                                setTimeout(function() {
                                    window.close();
                                }, 100);
                            };
                        <\/script>
                    </body>
                    </html>
                `);
                printWindow.document.close();
            });
            
            // Add event listeners to existing elements
            document.querySelectorAll('.delete-question').forEach(btn => {
                btn.addEventListener('click', function() {
                    this.closest('.question-item').remove();
                });
            });
            
            document.querySelectorAll('.question-type').forEach(select => {
                select.addEventListener('change', function() {
                    const mcqContainer = this.closest('.question-item').querySelector('.mcq-options-container');
                    if (mcqContainer) {
                        mcqContainer.style.display = this.value === 'mcq' ? 'block' : 'none';
                    }
                });
            });
            
            document.querySelectorAll('.add-table-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const tableContainer = document.createElement('div');
                    tableContainer.className = 'table-container';
                    tableContainer.innerHTML = `
                        <label class="form-label">Table Data</label>
                        <div class="size-controls">
                            <div class="size-control">
                                <label>Font Size:</label>
                                <input type="number" class="form-control form-control-sm table-font-size" value="12" min="8" max="16">
                                <span>pt</span>
                            </div>
                            <div class="size-control">
                                <label>Cell Padding:</label>
                                <input type="number" class="form-control form-control-sm table-padding" value="3" min="1" max="8">
                                <span>px</span>
                            </div>
                        </div>
                        <div class="mb-2">
                            <button type="button" class="btn btn-sm btn-outline-secondary add-table-row">
                                <i class="fas fa-plus"></i> Add Row
                            </button>
                            <button type="button" class="btn btn-sm btn-outline-secondary add-table-col">
                                <i class="fas fa-plus"></i> Add Column
                            </button>
                            <button type="button" class="btn btn-sm btn-outline-danger remove-table">
                                <i class="fas fa-trash"></i> Remove Table
                            </button>
                        </div>
                        <div class="table-data">
                            <div class="table-row">
                                <input type="text" class="form-control form-control-sm" placeholder="Header 1">
                                <input type="text" class="form-control form-control-sm" placeholder="Header 2">
                                <button class="btn btn-sm btn-outline-danger delete-table-col">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                            <div class="table-row">
                                <input type="text" class="form-control form-control-sm" placeholder="Data 1">
                                <input type="text" class="form-control form-control-sm" placeholder="Data 2">
                                <button class="btn btn-sm btn-outline-danger delete-table-col">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </div>
                    `;
                    
                    this.parentElement.parentElement.insertBefore(tableContainer, this.parentElement.nextSibling);
                    
                    const container = tableContainer;
                    
                    // Add table functionality
                    container.querySelector('.add-table-row').addEventListener('click', function() {
                        const tableData = container.querySelector('.table-data');
                        const firstRow = tableData.querySelector('.table-row');
                        const colCount = firstRow.querySelectorAll('input').length;
                        
                        let rowHtml = '<div class="table-row">';
                        for (let i = 0; i < colCount; i++) {
                            rowHtml += `<input type="text" class="form-control form-control-sm" placeholder="Data">`;
                        }
                        rowHtml += `<button class="btn btn-sm btn-outline-danger delete-table-col">
                                        <i class="fas fa-trash"></i>
                                    </button>`;
                        rowHtml += '</div>';
                        
                        tableData.insertAdjacentHTML('beforeend', rowHtml);
                        
                        tableData.lastElementChild.querySelector('.delete-table-col').addEventListener('click', function() {
                            const row = this.closest('.table-row');
                            if (row.querySelectorAll('input').length > 1) {
                                row.removeChild(row.querySelector('input:last-of-type'));
                            }
                        });
                    });
                    
                    container.querySelector('.add-table-col').addEventListener('click', function() {
                        const tableRows = container.querySelectorAll('.table-row');
                        
                        tableRows.forEach(row => {
                            const newCol = document.createElement('input');
                            newCol.type = 'text';
                            newCol.className = 'form-control form-control-sm';
                            newCol.placeholder = row === tableRows[0] ? 'Header' : 'Data';
                            
                            const deleteBtn = row.querySelector('.delete-table-col');
                            row.insertBefore(newCol, deleteBtn);
                        });
                    });
                    
                    container.querySelector('.remove-table').addEventListener('click', function() {
                        container.remove();
                    });
                    
                    container.querySelectorAll('.delete-table-col').forEach(btn => {
                        btn.addEventListener('click', function() {
                            const row = this.closest('.table-row');
                            if (row.querySelectorAll('input').length > 1) {
                                row.removeChild(row.querySelector('input:last-of-type'));
                            }
                        });
                    });
                });
            });
        });
    </script>
</body>
</html>
